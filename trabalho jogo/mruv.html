<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora - MRUV</title>

    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>

    <style>
        body {
            background-color: #2e3250;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 50px;
            font-weight: normal;
            margin: 40px 0 0 0;
        }

        .meio {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            padding: 20px;
        }

        .caixa {
            border: 2px solid #d6d6d6;
            border-radius: 8px;
            padding: 40px;
            width: 500px;
        }

        .campo {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .campo label {
            width: 180px;
            font-size: 18px;
        }

        .campo input {
            flex: 1;
            height: 30px;
            background-color: #d6d6d6;
            border: none;
            border-radius: 4px;
            padding: 0 8px;
            font-size: 16px;
            color: #2e3250;
        }

        .botoes {
            display: flex;
            gap: 20px;
            width: 580px;
        }

        .botoes button {
            flex: 1;
            height: 50px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-calcular {
            background-color: #d6d6d6;
            color: #2e3250;
        }

        .btn-limpar {
            background-color: #d6d6d6;
            color: #2e3250;
        }

        #grafico {
            width: 580px;
            height: 400px;
            display: none;
        }
    </style>
</head>
<body>

    <h1>Calculadora - MRUV</h1>

<div class="meio">
    <div class="caixa">
        <div class="campo">
            <label>Posição inicial:</label>
            <input type="number" id="posInicial" placeholder="m">
        </div>

        <div class="campo">
            <label>Velocidade inicial:</label>
            <input type="number" id="velocidade" placeholder="m/s">
        </div>

        <div class="campo">
            <label>Aceleração:</label>
            <input type="number" id="aceleracao" placeholder="m/s²">
        </div>

        <div class="campo">
            <label>Tempo:</label>
            <input type="number" id="tempo" placeholder="s">
        </div>
    </div>

    <div class="botoes">
        <button class="btn-calcular" onclick="calcular()">Calcular</button>
        <button class="btn-limpar" onclick="limpar()">Limpar</button>
    </div>
    <div id="grafico"></div>
</div>

<script>
function calcular() {
    const posInicial = Number(document.getElementById("posInicial").value);
    const velocidade = Number(document.getElementById("velocidade").value);
    const aceleracao = Number(document.getElementById("aceleracao").value);
    const tempo = Number(document.getElementById("tempo").value);

    const tValores = [];
    const sValores = [];

    for (let t = 0; t <= tempo; t += 0.1) {
        let s = posInicial + velocidade * t + (aceleracao * t ** 2) / 2;

        tValores.push(t.toFixed(2));
        sValores.push(s); 
    }

    const dados = [{
        x: sValores,
        y: tValores,
        mode: "lines", 
        type: "scatter",
        line: { color: '#2e3250', width: 3 }
    }];

    const layout = {
        title: `Gráfico MRUV (S = ${posInicial} + ${velocidade}*t + (${aceleracao}*t²)/2)`,
        paper_bgcolor: '#2e3250',
        plot_bgcolor: '#ffffff',
        font: { color: '#ffffff' }, 
        xaxis: { title: 'Tempo (s)', gridcolor: '#f0f0f0' },
        yaxis: { title: 'Posição (m)', gridcolor: '#f0f0f0' }
    };

    document.getElementById("grafico").style.display = "block";
    Plotly.newPlot("grafico", dados, layout);
}
    
function limpar() {
    document.getElementById("tempo").value = "";
    document.getElementById("posInicial").value = "";
    document.getElementById("velocidade").value = "";
    document.getElementById("aceleracao").value = "";
    document.getElementById("grafico").style.display = "none";
}

</script>
</body>
</html>
